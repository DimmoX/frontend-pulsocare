version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    # Angular 17+ deja el build en dist/<proyecto>/browser
    baseDirectory: dist/front-pulsocare/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
